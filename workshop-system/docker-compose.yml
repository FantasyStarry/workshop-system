version: '3.8'

services:
  mysql:
    image: mysql:8.0
    container_name: workshop-mysql
    restart: unless-stopped
    ports:
      - "3306:3306"
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: workshop_db
      MYSQL_CHARSET: utf8mb4
      MYSQL_COLLATION: utf8mb4_general_ci
    volumes:
      - mysql_data:/var/lib/mysql
      - ./sql/01-schema.sql:/docker-entrypoint-initdb.d/01-schema.sql
      - ./sql/02-init-data.sql:/docker-entrypoint-initdb.d/02-init-data.sql
      - ./sql/03-position-tables.sql:/docker-entrypoint-initdb.d/03-position-tables.sql
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_general_ci
      - --default-time-zone=+08:00

volumes:
  mysql_data:
